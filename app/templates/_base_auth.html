<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DexFlow{% endblock %}</title>
    <link rel="icon" href="/static/brand/dexterous-icon.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/custom.css">
    <style>[x-cloak] { display: none !important; }</style>
    <script>
      document.addEventListener('alpine:init', () => {
        Alpine.store('sidebar', {
          collapsed: false,
          open: false,
          init() {
            this.collapsed = localStorage.getItem('dexflow.sidebar.collapsed') === 'true';
            window.addEventListener('keydown', (e) => {
              if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'b') {
                e.preventDefault();
                this.toggleCollapsed();
              }
            });
          },
          toggleCollapsed() {
            this.collapsed = !this.collapsed;
            localStorage.setItem('dexflow.sidebar.collapsed', this.collapsed);
          },
          toggleMobile() { this.open = !this.open; },
          closeMobile() { this.open = false; }
        });
      });
    </script>
</head>
<body class="min-h-screen" x-data x-init="$store.sidebar.init()">

  <div class="flex min-h-screen">

    {# Mobile backdrop #}
    <div x-show="$store.sidebar.open" x-cloak @click="$store.sidebar.closeMobile()"
         class="fixed inset-0 bg-slate-900/40 z-30 md:hidden"></div>

    {% include "_sidebar.html" %}

    <div class="flex-1 flex flex-col min-w-0">
      {# Mobile top bar — only visible below md breakpoint #}
      <header class="md:hidden flex items-center justify-between px-4 py-3 border-b-2 border-slate-900 bg-white">
        <button type="button" @click="$store.sidebar.toggleMobile()"
                class="p-2 -ml-2 rounded-md text-slate-700 hover:bg-slate-100"
                aria-label="Open navigation">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <a href="/home" class="flex items-center gap-2">
          <img src="/static/brand/dexterous-icon.jpg" alt="" class="w-8 h-8 rounded-lg border-2 border-slate-900">
          <span class="font-bold tracking-tight">DexFlow</span>
        </a>
        <span class="w-8"></span>
      </header>

      <main class="flex-1 py-8 sm:py-12">
        {% block content %}{% endblock %}
      </main>

      <footer class="py-5 text-center text-xs font-semibold uppercase tracking-wider text-slate-400 border-t-2 border-slate-200">
        DexFlow · Dexterous Group internal tooling
      </footer>
    </div>

  </div>

</body>
</html>
