services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-dherick07/dexflow}:latest
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - ENV=production

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
